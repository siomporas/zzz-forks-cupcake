# Lightweight CI for Pull Requests
# Runs fast checks only - full test suite runs on merge to main (ci-full.yml)
name: CI

on:
  pull_request:
    branches: [main]
    paths:
      # Rust code changes
      - "**.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      # CI workflow changes
      - ".github/workflows/ci.yml"
      # Policy/fixture changes that affect tests
      - "fixtures/**"
      - "**.rego"
      # Python binding changes
      - "cupcake-py/**"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Unit Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Install OPA
        run: |
          curl -L -o opa https://github.com/open-policy-agent/opa/releases/download/v1.7.1/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/
          opa version

      - name: Clean up any existing global config (test isolation)
        run: |
          # Remove any pre-existing global cupcake config to ensure test isolation
          CONFIG_DIR="$HOME/.config/cupcake"
          if [ -d "$CONFIG_DIR" ]; then
            echo "Found existing global config at: $CONFIG_DIR"
            echo "Removing for test isolation..."
            rm -rf "$CONFIG_DIR"
            echo "Cleaned up global config directory"
          else
            echo "No existing global config found at: $CONFIG_DIR"
          fi

      - name: Run unit tests
        run: |
          cargo test --lib --bins
        env:
          CI: true

      - name: Run doc-tests
        run: |
          cargo test --doc -j 1 -- --test-threads=1
        env:
          CI: true

  test-python:
    name: Python Bindings (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OPA
        run: |
          curl -L -o opa https://github.com/open-policy-agent/opa/releases/download/v1.7.1/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/
          opa version

      - name: Install maturin and test dependencies
        run: pip install maturin pytest pytest-asyncio

      - name: Build Python bindings
        run: |
          cd cupcake-py
          maturin develop --release

      - name: Run Python tests
        run: |
          cd cupcake-py
          pytest tests/ -v
        env:
          CI: true
